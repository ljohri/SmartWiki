name: CI/CD

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  UV_PYTHON: "3.12"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.3"
          enable-cache: true

      - name: Python
        run: uv python install ${{ env.UV_PYTHON }}

      - name: Lockfile matches pyproject.toml
        run: uv lock --check

      - name: Sync environment (frozen lock)
        run: uv sync --frozen --all-groups

      - name: Unit tests
        run: uv run pytest tests/unit -v --tb=short

  docker-images:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image namespace (GHCR)
        run: |
          echo "IMAGE_NAMESPACE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Organizer
      - name: Docker metadata (organizer)
        id: meta-organizer
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/smartwiki-organizer
          tags: |
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build (and push on main/tag) — organizer
        uses: docker/build-push-action@v6
        with:
          context: ./wiki-organizer
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta-organizer.outputs.tags }}
          labels: ${{ steps.meta-organizer.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Chatbot
      - name: Docker metadata (chatbot)
        id: meta-chatbot
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/smartwiki-chatbot
          tags: |
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build (and push on main/tag) — chatbot
        uses: docker/build-push-action@v6
        with:
          context: ./chatbot-api
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta-chatbot.outputs.tags }}
          labels: ${{ steps.meta-chatbot.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary (push only)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          echo "### Published images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Organizer**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta-organizer.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Chatbot**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta-chatbot.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
