name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            wiki-organizer/requirements.txt
            chatbot-api/requirements.txt
            tests/requirements-test.txt
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r wiki-organizer/requirements.txt -r chatbot-api/requirements.txt
          pip install -r tests/requirements-test.txt
      - name: Unit tests
        run: pytest tests/unit -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build organizer image
        run: docker build -t smartwiki-organizer:test ./wiki-organizer
      - name: Build chatbot image
        run: docker build -t smartwiki-chatbot:test ./chatbot-api
