name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_PYTHON: "3.12"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.3"
          enable-cache: true

      - name: Python
        run: uv python install ${{ env.UV_PYTHON }}

      - name: Lockfile matches pyproject.toml
        run: uv lock --check

      - name: Sync environment (frozen lock)
        run: uv sync --frozen --all-groups

      - name: Unit tests
        run: uv run pytest tests/unit -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build organizer image
        run: docker build -t smartwiki-organizer:test ./wiki-organizer
      - name: Build chatbot image
        run: docker build -t smartwiki-chatbot:test ./chatbot-api
